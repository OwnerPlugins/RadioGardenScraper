name: Radio Garden Scraper

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run scraper
        run: |
          python radiogarden_scraper.py

      - name: Create output directory
        run: mkdir -p output

      - name: Copy JSON to output folder
        run: |
          cp radio_garden.json output/

      - name: Commit and push JSON to repo
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add output/radio_garden.json
          git commit -m "Auto-update radio_garden.json [skip ci]" || echo "No changes to commit"
          git push
