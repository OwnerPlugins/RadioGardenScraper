name: Radio Garden Scraper

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run scraper
        run: |
          python radiogarden_scraper.py

      - name: Create output directory
        run: mkdir -p output

      - name: Copy JSON to output folder
        run: |
          cp radio_garden.json output/
          cp radio_garden_backup.json output/  # se vuoi anche il backup

      - name: Upload JSON as artifact
        uses: actions/upload-artifact@v4
        with:
          name: radio-garden-data
          path: output/
